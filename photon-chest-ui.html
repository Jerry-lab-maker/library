<!DOCTYPE html>
<html lang="zh-CN" style="color-scheme: light;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FFF8F0">
<title>光子 Photon — 胸口状态屏</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF8F0;
    --card-bg: #FFFFFF;
    --card-border: rgba(0,0,0,0.05);
    --card-shadow: 0 2px 16px rgba(0,0,0,0.05);
    --text-primary: #2D2A26;
    --text-secondary: #7A7570;
    --text-hint: #B5AFA9;
    --accent: #E8734A;
    --accent-light: #FFF0EB;
    --green: #4CAF7D;
    --green-light: #EEFBF3;
    --blue: #5B8DEF;
    --blue-light: #EEF4FF;
    --purple: #9B7FE6;
    --purple-light: #F3EFFE;
    --pink: #E8729A;
    --pink-light: #FFF0F5;
    --gold: #E6A840;
    --gold-light: #FFF8EB;
    --teal: #4DB6AC;
    --teal-light: #EDFAF8;
    --red: #E05555;
    --red-light: #FFF0F0;
    --radius: 24px;
    --radius-lg: 32px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }

  .screen {
    width: 100%;
    max-width: 400px;
    height: 100vh;
    max-height: 540px;
    position: relative;
    overflow: hidden;
    background: var(--bg);
    pointer-events: none;
  }

  /* ============================================================
     1. 开机Logo页
     ============================================================ */
  .boot-screen {
    position: absolute;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    background: linear-gradient(160deg, #FFF8F0 0%, #FFE8DB 50%, #FFF0EB 100%);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  .boot-screen.hidden {
    opacity: 0;
    transform: scale(1.05);
    pointer-events: none;
  }

  .boot-logo {
    width: 420px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: bootLogoIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .boot-logo img {
    width: 420px;
    height: auto;
    object-fit: contain;
  }
  @keyframes bootLogoIn {
    from { opacity: 0; transform: scale(0.5) rotate(-10deg); }
    to { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  .boot-company {
    font-size: 28px;
    font-weight: 900;
    color: var(--text-primary);
    letter-spacing: 6px;
    animation: bootTextIn 0.8s ease-out 0.3s both;
    text-wrap: balance;
    text-align: center;
  }
  .boot-tagline {
    font-size: 15px;
    color: var(--text-secondary);
    font-weight: 400;
    letter-spacing: 2px;
    animation: bootTextIn 0.8s ease-out 0.5s both;
  }
  .boot-divider {
    width: 40px; height: 3px;
    border-radius: 2px;
    background: var(--accent);
    opacity: 0.3;
    animation: bootTextIn 0.8s ease-out 0.4s both;
  }
  @keyframes bootTextIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .boot-loading {
    position: absolute;
    bottom: 60px;
    display: flex;
    gap: 8px;
    animation: bootTextIn 0.8s ease-out 0.7s both;
  }
  .boot-loading-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.3;
    animation: bootDotPulse 1.2s ease-in-out infinite;
  }
  .boot-loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .boot-loading-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bootDotPulse {
    0%, 100% { opacity: 0.2; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  /* ============================================================
     2. 主界面
     ============================================================ */
  .bg-deco {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    z-index: 0;
    pointer-events: none;
  }
  .bg-deco-1 {
    width: 300px; height: 300px;
    background: rgba(232,115,74,0.07);
    top: -100px; right: -80px;
  }
  .bg-deco-2 {
    width: 250px; height: 250px;
    background: rgba(91,141,239,0.05);
    bottom: 80px; left: -80px;
  }

  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 20px 22px 22px;
  }

  /* 状态栏 */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 4px;
    margin-bottom: 8px;
  }
  .status-time {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-secondary);
    font-variant-numeric: tabular-nums;
    letter-spacing: 1px;
  }
  .status-icons {
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .status-icons svg {
    width: 18px; height: 18px;
    fill: none;
    stroke: var(--text-hint);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .battery-bar {
    display: flex;
    gap: 2px;
    align-items: flex-end;
  }
  .battery-bar span {
    width: 4px;
    background: var(--green);
    border-radius: 2px;
  }
  .battery-bar span:nth-child(1) { height: 7px; }
  .battery-bar span:nth-child(2) { height: 11px; }
  .battery-bar span:nth-child(3) { height: 15px; }
  .battery-bar span:nth-child(4) { height: 19px; opacity: 0.25; }

  /* 主状态区 */
  .main-status {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .status-icon-ring {
    width: 90px; height: 90px;
    border-radius: 50%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .status-icon-ring::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: var(--accent-light);
    animation: breathe 3s ease-in-out infinite;
  }
  .status-icon-inner {
    position: relative;
    z-index: 2;
    width: 72px; height: 72px;
    border-radius: 50%;
    background: var(--card-bg);
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.6s ease;
  }
  .status-icon-inner svg {
    width: 34px; height: 34px;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.6s ease;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.08); opacity: 1; }
  }

  .status-title {
    font-size: 24px;
    font-weight: 900;
    color: var(--text-primary);
    text-align: center;
    line-height: 1.3;
    text-wrap: balance;
    transition: opacity 0.4s ease;
  }
  .status-subtitle {
    font-size: 15px;
    color: var(--text-secondary);
    text-align: center;
    line-height: 1.5;
    max-width: 260px;
    transition: opacity 0.4s ease;
  }

  /* ===== 对话文字区（说话状态时显示） ===== */
  .chat-area {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-height 0.5s ease, opacity 0.5s ease, margin 0.5s ease;
    margin-top: 0;
  }
  .chat-area.visible {
    max-height: 300px;
    opacity: 1;
    margin-top: 8px;
    overflow-y: auto;
  }

  /* 对话时隐藏底部信息条和语音指示 */
  .content.chat-active .info-strip,
  .content.chat-active .voice-indicator {
    opacity: 0;
    max-height: 0;
    margin-top: 0;
    padding: 0;
    overflow: hidden;
    pointer-events: none;
    transition: opacity 0.4s ease, max-height 0.4s ease, margin 0.4s ease, padding 0.4s ease;
  }
  .info-strip, .voice-indicator {
    transition: opacity 0.4s ease, max-height 0.4s ease, margin 0.4s ease, padding 0.4s ease;
  }

  .chat-bubble {
    padding: 12px 16px;
    border-radius: 20px;
    font-size: 15px;
    font-weight: 500;
    line-height: 1.6;
    max-width: 90%;
    animation: bubbleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    word-break: break-word;
  }
  .chat-bubble.user {
    background: var(--blue-light);
    color: var(--blue);
    border-bottom-right-radius: 6px;
  }
  .chat-bubble.robot {
    align-self: flex-start;
    background: var(--card-bg);
    color: var(--text-primary);
    border: 1px solid var(--card-border);
    box-shadow: var(--card-shadow);
    border-bottom-left-radius: 6px;
  }
  .chat-bubble-label {
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 4px;
    opacity: 0.6;
  }
  .chat-bubble.user .chat-bubble-label { color: var(--blue); }
  .chat-bubble.robot .chat-bubble-label { color: var(--accent); }

  @keyframes bubbleIn {
    from { opacity: 0; transform: translateY(8px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* 信息条 */
  .info-strip {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }
  .info-chip {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 10px;
    background: var(--card-bg);
    border-radius: var(--radius);
    border: 1px solid var(--card-border);
    box-shadow: var(--card-shadow);
  }
  .info-chip svg {
    width: 20px; height: 20px;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
  }
  .info-chip-text {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .info-chip-label {
    font-size: 11px;
    color: var(--text-hint);
    font-weight: 500;
    line-height: 1.2;
  }
  .info-chip-value {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.3;
    transition: opacity 0.4s ease;
  }
  .info-chip-value.fading { opacity: 0; }
  .info-chip-label {
    transition: opacity 0.4s ease;
  }
  .info-chip-label.fading { opacity: 0; }

  /* 底部语音指示 */
  .voice-indicator {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 14px 20px;
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    border: 1px solid var(--card-border);
    box-shadow: var(--card-shadow);
    margin-top: 12px;
  }
  .voice-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    animation: dotPulse 2s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }
  .voice-text {
    font-size: 15px;
    color: var(--text-secondary);
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  /* ===== 状态主题色 ===== */
  .theme-idle .status-icon-ring::before { background: var(--accent-light); }
  .theme-idle .status-icon-inner svg { stroke: var(--accent); }
  .theme-idle .voice-dot { background: var(--green); }

  .theme-listening .status-icon-ring::before { background: var(--blue-light); }
  .theme-listening .status-icon-inner svg { stroke: var(--blue); }
  .theme-listening .voice-dot { background: var(--blue); animation: dotPulse 0.6s ease-in-out infinite; }

  .theme-thinking .status-icon-ring::before { background: var(--purple-light); }
  .theme-thinking .status-icon-inner svg { stroke: var(--purple); }
  .theme-thinking .voice-dot { background: var(--purple); animation: dotPulse 1s ease-in-out infinite; }

  .theme-speaking .status-icon-ring::before { background: var(--green-light); }
  .theme-speaking .status-icon-inner svg { stroke: var(--green); }
  .theme-speaking .voice-dot { background: var(--green); animation: dotPulse 0.8s ease-in-out infinite; }

  .theme-music .status-icon-ring::before { background: var(--pink-light); }
  .theme-music .status-icon-inner svg { stroke: var(--pink); }
  .theme-music .voice-dot { background: var(--pink); }

  .theme-news .status-icon-ring::before { background: var(--blue-light); }
  .theme-news .status-icon-inner svg { stroke: var(--blue); }
  .theme-news .voice-dot { background: var(--blue); }

  .theme-dancing .status-icon-ring::before { background: var(--gold-light); }
  .theme-dancing .status-icon-inner svg { stroke: var(--gold); }
  .theme-dancing .voice-dot { background: var(--gold); animation: dotPulse 0.5s ease-in-out infinite; }

  /* 淡入淡出 */
  .fade-content { transition: opacity 0.4s ease; }
  .fade-content.fading { opacity: 0; }

  /* ============================================================
     3. 弹窗提示系统
     ============================================================ */
  .alert-overlay {
    position: absolute;
    inset: 0;
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(45,42,38,0.3);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .alert-overlay.visible {
    opacity: 1;
  }

  .alert-card {
    width: 85%;
    max-width: 340px;
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    padding: 28px 24px 24px;
    text-align: center;
    box-shadow: 0 16px 48px rgba(0,0,0,0.12);
    transform: scale(0.9) translateY(12px);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .alert-overlay.visible .alert-card {
    transform: scale(1) translateY(0);
  }

  .alert-icon {
    width: 64px; height: 64px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
  }
  .alert-icon svg {
    width: 32px; height: 32px;
    fill: none;
    stroke-width: 2.2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* 低电量 */
  .alert-battery .alert-icon {
    background: var(--gold-light);
  }
  .alert-battery .alert-icon svg { stroke: var(--gold); }
  .alert-battery .alert-title { color: var(--gold); }

  /* 网络异常 */
  .alert-network .alert-icon {
    background: var(--red-light);
  }
  .alert-network .alert-icon svg { stroke: var(--red); }
  .alert-network .alert-title { color: var(--red); }

  /* 危险情况 */
  .alert-danger .alert-icon {
    background: var(--red-light);
    animation: dangerPulse 1s ease-in-out infinite;
  }
  .alert-danger .alert-icon svg { stroke: var(--red); }
  .alert-danger .alert-title { color: var(--red); }
  .alert-danger .alert-card {
    border: 2px solid rgba(224,85,85,0.2);
  }
  @keyframes dangerPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(224,85,85,0.2); }
    50% { box-shadow: 0 0 0 12px rgba(224,85,85,0); }
  }

  .alert-title {
    font-size: 20px;
    font-weight: 900;
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .alert-desc {
    font-size: 16px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .alert-footer {
    display: flex;
    gap: 10px;
  }
  .alert-btn {
    flex: 1;
    padding: 14px 16px;
    border-radius: 16px;
    border: none;
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    outline: none;
  }
  .alert-btn:focus-visible {
    outline: 3px solid var(--accent);
    outline-offset: 2px;
  }
  .alert-btn:active {
    transform: scale(0.96);
  }
  .alert-btn-primary {
    background: var(--accent);
    color: #FFFFFF;
    box-shadow: 0 4px 16px rgba(232,115,74,0.25);
  }
  .alert-btn-secondary {
    background: var(--bg);
    color: var(--text-secondary);
    border: 1px solid var(--card-border);
  }

  /* ===== prefers-reduced-motion ===== */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<div class="screen" id="screen">

  <!-- ===== 1. 开机Logo页 ===== -->
  <div class="boot-screen" id="bootScreen" role="status" aria-label="开机画面">
    <div class="boot-logo" aria-hidden="true">
      <img src="assets/logo.png" alt="光谷东智">
    </div>
    <div class="boot-tagline">智慧生活、伴你左右</div>
    <div class="boot-loading" aria-label="加载中">
      <div class="boot-loading-dot"></div>
      <div class="boot-loading-dot"></div>
      <div class="boot-loading-dot"></div>
    </div>
  </div>

  <!-- ===== 2. 弹窗提示层 ===== -->
  <!-- 低电量弹窗 -->
  <div class="alert-overlay alert-battery" id="alertBattery" role="alertdialog" aria-label="低电量提示">
    <div class="alert-card">
      <div class="alert-icon">
        <svg viewBox="0 0 24 24">
          <rect x="1" y="6" width="18" height="12" rx="2" ry="2"/>
          <line x1="23" y1="13" x2="23" y2="11"/>
          <line x1="11" y1="9" x2="7" y2="15"/>
          <polyline points="11,15 7,15 7,9" fill="none"/>
        </svg>
      </div>
      <div class="alert-title">电量不足</div>
      <div class="alert-desc">光子电量低于20%，请尽快充电，以免影响正常使用</div>
      <div class="alert-footer">
        <button class="alert-btn alert-btn-primary" onclick="hideAlert('alertBattery')">我知道了</button>
      </div>
    </div>
  </div>

  <!-- 网络异常弹窗 -->
  <div class="alert-overlay alert-network" id="alertNetwork" role="alertdialog" aria-label="网络异常提示">
    <div class="alert-card">
      <div class="alert-icon">
        <svg viewBox="0 0 24 24">
          <line x1="1" y1="1" x2="23" y2="23"/>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
          <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
          <line x1="12" y1="20" x2="12.01" y2="20"/>
        </svg>
      </div>
      <div class="alert-title">网络连接异常</div>
      <div class="alert-desc">光子无法连接网络，部分功能可能不可用，请检查WiFi设置</div>
      <div class="alert-footer">
        <button class="alert-btn alert-btn-secondary" onclick="hideAlert('alertNetwork')">稍后处理</button>
        <button class="alert-btn alert-btn-primary" onclick="hideAlert('alertNetwork')">正在检查</button>
      </div>
    </div>
  </div>

  <!-- 危险情况弹窗 -->
  <div class="alert-overlay alert-danger" id="alertDanger" role="alertdialog" aria-label="危险情况提示">
    <div class="alert-card">
      <div class="alert-icon">
        <svg viewBox="0 0 24 24">
          <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
      <div class="alert-title">请注意安全</div>
      <div class="alert-desc">检测到前方有障碍物，光子已自动停下，请协助移除障碍</div>
      <div class="alert-footer">
        <button class="alert-btn alert-btn-primary" onclick="hideAlert('alertDanger')">已处理</button>
      </div>
    </div>
  </div>

  <!-- ===== 3. 主界面 ===== -->
  <div class="bg-deco bg-deco-1" aria-hidden="true"></div>
  <div class="bg-deco bg-deco-2" aria-hidden="true"></div>

  <div class="content" id="mainContent">
    <!-- 状态栏 -->
    <div class="status-bar" role="status" aria-label="系统状态">
      <div class="status-time" id="clock" aria-label="当前时间">13:29</div>
      <div class="status-icons">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1" fill="currentColor" stroke="none"/></svg>
        <div class="battery-bar" aria-label="电池电量">
          <span></span><span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <!-- 主状态区 -->
    <div class="main-status" id="mainStatus">
      <div class="status-icon-ring">
        <div class="status-icon-inner" id="statusIcon">
          <svg viewBox="0 0 24 24" stroke="#E8734A">
            <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
          </svg>
        </div>
      </div>
      <div class="status-title fade-content" id="statusTitle">光子待命中</div>
      <div class="status-subtitle fade-content" id="statusSubtitle">有什么可以帮您的，对我说就好</div>

      <!-- 对话文字区 -->
      <div class="chat-area" id="chatArea">
        <!-- 对话气泡由JS动态插入 -->
      </div>
    </div>

    <!-- 信息条 -->
    <div class="info-strip" id="infoStrip">
      <div class="info-chip">
        <svg viewBox="0 0 24 24" stroke="#E8734A" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
        </svg>
        <div class="info-chip-text">
          <span class="info-chip-label" id="weatherLabel">武汉天气</span>
          <span class="info-chip-value" id="weatherValue">25°C 晴</span>
        </div>
      </div>
      <div class="info-chip">
        <svg viewBox="0 0 24 24" stroke="#5B8DEF" aria-hidden="true">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
        <div class="info-chip-text">
          <span class="info-chip-label" id="taskLabel">当前任务</span>
          <span class="info-chip-value" id="taskValue">提醒王奶奶吃药</span>
        </div>
      </div>
    </div>

    <!-- 语音状态指示 -->
    <div class="voice-indicator">
      <div class="voice-dot" id="voiceDot"></div>
      <span class="voice-text" id="voiceText">随时待命，等待语音指令</span>
    </div>
  </div>
</div>

<script>
// ============================================================
// 开机动画
// ============================================================
const bootScreen = document.getElementById('bootScreen');
// 3秒后隐藏开机页
setTimeout(() => {
  bootScreen.classList.add('hidden');
}, 3000);

// ============================================================
// 时钟
// ============================================================
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('clock').textContent = `${h}:${m}`;
}
updateClock();
setInterval(updateClock, 10000);

// ============================================================
// 底部信息轮播
// ============================================================
const weatherSlides = [
  { label: '武汉天气', value: '25°C 晴' },
  { label: '今日预报', value: '晴转多云 18~28°C' },
  { label: '明日预报', value: '小雨 16~22°C' },
];
const taskSlides = [
  { label: '当前任务', value: '提醒王奶奶吃药' },
  { label: '队列任务', value: '还有3项待执行' },
];

let weatherIdx = 0, taskIdx = 0;
const weatherLabel = document.getElementById('weatherLabel');
const weatherValue = document.getElementById('weatherValue');
const taskLabel = document.getElementById('taskLabel');
const taskValue = document.getElementById('taskValue');

function updateCarousel(labelEl, valueEl, slides, idx) {
  // 淡出
  labelEl.classList.add('fading');
  valueEl.classList.add('fading');
  setTimeout(() => {
    const item = slides[idx % slides.length];
    labelEl.textContent = item.label;
    valueEl.textContent = item.value;
    // 淡入
    labelEl.classList.remove('fading');
    valueEl.classList.remove('fading');
  }, 400);
}

setInterval(() => {
  weatherIdx++;
  updateCarousel(weatherLabel, weatherValue, weatherSlides, weatherIdx);
}, 5000);

setInterval(() => {
  taskIdx++;
  updateCarousel(taskLabel, taskValue, taskSlides, taskIdx);
}, 5000);

// ============================================================
// 弹窗系统
// ============================================================
let alertTimer = null;
function showAlert(id) {
  document.getElementById(id).classList.add('visible');
  // 5秒后自动关闭
  clearTimeout(alertTimer);
  alertTimer = setTimeout(() => hideAlert(id), 5000);
}
function hideAlert(id) {
  document.getElementById(id).classList.remove('visible');
  clearTimeout(alertTimer);
}

// ============================================================
// 对话系统
// ============================================================
const chatArea = document.getElementById('chatArea');
const mainContent = document.getElementById('mainContent');
let chatVisible = false;

function showChat() {
  chatArea.classList.add('visible');
  mainContent.classList.add('chat-active');
  chatVisible = true;
}
function hideChat() {
  chatArea.classList.remove('visible');
  mainContent.classList.remove('chat-active');
  chatVisible = false;
  // 清空对话
  setTimeout(() => { chatArea.innerHTML = ''; }, 500);
}

function addChatBubble(role, text) {
  showChat();
  const bubble = document.createElement('div');
  bubble.className = `chat-bubble ${role}`;
  const label = role === 'user' ? '您' : '光子';
  bubble.innerHTML = `<div class="chat-bubble-label">${label}</div><div>${text}</div>`;
  bubble.style.animationDelay = '0s';
  chatArea.appendChild(bubble);
  // 自动滚动到底部
  chatArea.scrollTop = chatArea.scrollHeight;
  // 最多保留4条
  const bubbles = chatArea.querySelectorAll('.chat-bubble');
  if (bubbles.length > 4) {
    bubbles[0].remove();
  }
}

// ============================================================
// 状态系统
// ============================================================
const states = [
  {
    id: 'idle',
    theme: 'theme-idle',
    icon: '<svg viewBox="0 0 24 24" stroke="#E8734A"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>',
    title: '光子待命中',
    subtitle: '有什么可以帮您的，对我说就好',
    voice: '随时待命，等待语音指令',
    onEnter: () => hideChat()
  },
  {
    id: 'listening',
    theme: 'theme-listening',
    icon: '<svg viewBox="0 0 24 24" stroke="#5B8DEF"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>',
    title: '正在聆听…',
    subtitle: '请说，我在认真听',
    voice: '聆听中…',
    onEnter: () => {}
  },
  {
    id: 'thinking',
    theme: 'theme-thinking',
    icon: '<svg viewBox="0 0 24 24" stroke="#9B7FE6"><circle cx="12" cy="12" r="10"/><path d="M12 16v.01"/><path d="M12 8a3 3 0 0 0-3 3c0 1.1.9 2 2 2h2a2 2 0 0 1 0 4"/></svg>',
    title: '让我想想…',
    subtitle: '正在为您思考',
    voice: '思考中…',
    onEnter: () => {}
  },
  {
    id: 'speaking',
    theme: 'theme-speaking',
    icon: '<svg viewBox="0 0 24 24" stroke="#4CAF7D"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>',
    title: '光子正在说话',
    subtitle: '今天武汉天气不错，25度晴天…',
    voice: '播放中…',
    onEnter: () => {
      addChatBubble('user', '今天天气怎么样？');
      setTimeout(() => addChatBubble('robot', '今天武汉天气不错，25度晴天，适合出门散步哦！'), 800);
    }
  },
  {
    id: 'music',
    theme: 'theme-music',
    icon: '<svg viewBox="0 0 24 24" stroke="#E8729A"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>',
    title: '正在播放音乐',
    subtitle: '茉莉花 — 民乐精选',
    voice: '音乐播放中',
    onEnter: () => {
      addChatBubble('user', '放一首茉莉花');
      setTimeout(() => addChatBubble('robot', '好的，正在为您播放《茉莉花》🎵'), 600);
    }
  },
  {
    id: 'news',
    theme: 'theme-news',
    icon: '<svg viewBox="0 0 24 24" stroke="#5B8DEF"><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/></svg>',
    title: '正在播报新闻',
    subtitle: '今日要闻：科技助力养老…',
    voice: '新闻播报中',
    onEnter: () => {
      addChatBubble('user', '有什么新闻？');
      setTimeout(() => addChatBubble('robot', '为您播报今日新闻：科技助力养老，智能机器人走进千家万户…'), 600);
    }
  },
  {
    id: 'dancing',
    theme: 'theme-dancing',
    icon: '<svg viewBox="0 0 24 24" stroke="#E6A840"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>',
    title: '光子在跳舞 💃',
    subtitle: '跟着音乐动起来！',
    voice: '跳舞模式',
    onEnter: () => {
      addChatBubble('user', '跳个舞吧');
      setTimeout(() => addChatBubble('robot', '好呀，看我的！💃'), 600);
    }
  }
];

const mainStatus = document.getElementById('mainStatus');
const statusIcon = document.getElementById('statusIcon');
const statusTitle = document.getElementById('statusTitle');
const statusSubtitle = document.getElementById('statusSubtitle');
const voiceText = document.getElementById('voiceText');

let currentStateIndex = -1;

function switchState(index) {
  const state = states[index];
  if (index === currentStateIndex) return;
  currentStateIndex = index;

  statusTitle.classList.add('fading');
  statusSubtitle.classList.add('fading');

  setTimeout(() => {
    mainStatus.className = mainStatus.className.replace(/theme-\w+/g, '').trim();
    mainStatus.classList.add('main-status', state.theme);

    statusIcon.innerHTML = state.icon;
    statusTitle.textContent = state.title;
    statusSubtitle.textContent = state.subtitle;
    voiceText.textContent = state.voice;

    statusTitle.classList.remove('fading');
    statusSubtitle.classList.remove('fading');

    // 执行状态进入回调
    if (state.onEnter) state.onEnter();
  }, 400);
}

// ============================================================
// 演示轮播（实际由机器人程序驱动）
// ============================================================
const demoSequence = [
  { delay: 3500, action: 'state', value: 0 },   // 开机后进入待机
  { delay: 4000, action: 'state', value: 1 },   // 聆听
  { delay: 3000, action: 'state', value: 2 },   // 思考
  { delay: 3000, action: 'state', value: 3 },   // 说话（带对话）
  { delay: 5000, action: 'state', value: 0 },   // 回到待机
  { delay: 3000, action: 'state', value: 1 },   // 聆听
  { delay: 3000, action: 'state', value: 2 },   // 思考
  { delay: 3000, action: 'state', value: 4 },   // 音乐（带对话）
  { delay: 5000, action: 'state', value: 0 },   // 回到待机
  { delay: 2000, action: 'alert', value: 'alertBattery' },  // 低电量弹窗（5秒自动消失）
  { delay: 7000, action: 'state', value: 0 },   // 回到待机
  { delay: 3000, action: 'state', value: 1 },   // 聆听
  { delay: 3000, action: 'state', value: 2 },   // 思考
  { delay: 3000, action: 'state', value: 6 },   // 跳舞（带对话）
  { delay: 5000, action: 'state', value: 0 },   // 回到待机
  { delay: 2000, action: 'alert', value: 'alertNetwork' },  // 网络异常弹窗
  { delay: 7000, action: 'state', value: 0 },   // 回到待机
  { delay: 2000, action: 'alert', value: 'alertDanger' },   // 危险弹窗
  { delay: 7000, action: 'state', value: 0 },   // 回到待机 → 循环
];

let demoIndex = 0;
function runDemo() {
  const item = demoSequence[demoIndex % demoSequence.length];
  if (item.action === 'alert') {
    showAlert(item.value);
  } else {
    switchState(item.value);
  }
  demoIndex++;
  setTimeout(runDemo, item.delay);
}

// 启动演示（开机3秒后开始）
setTimeout(runDemo, 3500);
</script>

</body>
</html>
